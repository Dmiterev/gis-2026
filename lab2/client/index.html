<!doctype html>
<html lang="ru">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>GIS Lab 3 - Overture Maps + Хороплет</title>
    </head>
    <body>
      <main>
        <div id="map-container">
          <div id="map"></div>
          <div class="map-controls">
            <div class="legend">
              <h3>Легенда</h3>
              <div class="legend-item">
                <span class="legend-color building-color"></span>
                <span>Здания (WMS)</span>
              </div>
              <div class="legend-item">
                <span class="legend-color road-color"></span>
                <span>Дороги (WMS)</span>
              </div>
              <div class="legend-item">
                <span class="legend-color poi-color"></span>
                <span>Точки интереса (WMS)</span>
              </div>
              <div class="legend-item">
                <span class="legend-color overture-my-color"></span>
                <span>my – пользовательские данные</span>
              </div>
              <div class="legend-item">
                <span class="legend-color overture-osm-color"></span>
                <span>osm – OpenStreetMap</span>
              </div>
              <div class="legend-item">
                <span class="legend-color overture-ml-color"></span>
                <span>ml – машинное обучение</span>
              </div>
            </div>
            <div class="layer-controls">
              <h3>Слои</h3>
              <label>
                <input type="checkbox" id="buildings-toggle" checked>
                Здания (WMS)
              </label>
              <label>
                <input type="checkbox" id="roads-toggle" checked>
                Дороги (WMS)
              </label>
              <label>
                <input type="checkbox" id="poi-toggle" checked>
                Точки интереса (WMS)
              </label>
              <label>
                <input type="checkbox" id="overture-toggle" checked>
                Overture Buildings
              </label>
            </div>
          </div>
        </div>
      </main>
      <script type="module" src="/src/main.js"></script>
    </body>
</html>
